<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - School MIS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/clean-styles.css">
    <style>
        .offline-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .offline-icon {
            font-size: 4rem;
            color: #4A90E2;
            margin-bottom: 1rem;
        }

        .offline-message {
            margin-bottom: 2rem;
        }

        .offline-features {
            text-align: left;
            background: rgba(74, 144, 226, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .offline-features h3 {
            color: #4A90E2;
        }

        .feature-list {
            list-style-type: none;
            padding: 0;
        }

        .feature-list li {
            padding: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .feature-list i {
            color: #4A90E2;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h1>You're Offline</h1>
        
        <div class="offline-message">
            <p>Don't worry! You can still use these features:</p>
        </div>

        <div class="offline-features">
            <h3>Available Offline</h3>
            <ul class="feature-list">
                <li>
                    <i class="fas fa-check-circle"></i>
                    Record attendance (will sync when online)
                </li>
                <li>
                    <i class="fas fa-check-circle"></i>
                    Record audio lessons (will sync when online)
                </li>
                <li>
                    <i class="fas fa-check-circle"></i>
                    View cached content
                </li>
            </ul>
        </div>

        <button onclick="window.location.reload()" class="btn btn-primary">
            <i class="fas fa-sync"></i> Try Again
        </button>
    </div>
</body>
</html>
